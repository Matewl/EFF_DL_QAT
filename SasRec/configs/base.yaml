experiment:
  seed: 42
  device: cuda
  deterministic: true

model:
  hidden_units: 64 
  num_blocks: 2
  num_heads: 1
  dropout_rate: 0.2
  maxlen: 50
  norm_first: true
  share_item_emb: false

data:
  path: ./data/
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1

training:
  epochs: 20
  batch_size: 128
  num_workers: 16
  eval_interval: 1
  # patience: 10

optimization:
  lr: 0.001
  qat_lr: 0.0001
  # weight_decay: 0.00001
  # betas: [0.9, 0.98]
  # eps: 0.00000001

paths:
  checkpoints_dir: ./checkpoints/sasrec_runs
  results_dir: ./results

logging:
  backend: clearml
  clearml:
    project_name: "SASREC-QAT"
    task_name: none
    tags: ["recommendation", "sasrec"]
